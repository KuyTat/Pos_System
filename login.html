<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mart POS Login</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <style>
      body {
        background: #f2f2f2;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-card {
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 400px;
      }
      .login-card h2 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: bold;
        color: #333;
      }
      .btn-login {
        background-color: #007bff;
        color: #fff;
      }
      .btn-login:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Mart POS Login</h2>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            autofocus
            placeholder="Enter your username"
            required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Enter your password"
            required />
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-login btn-lg">Login</button>
        </div>
        <!-- <div class="mt-3 text-center">
          <a href="#">Forgot Password?</a>
        </div> -->
      </form>
    </div>
    <script>
      let username_input = document.querySelector("#username");
      let password_input = document.querySelector("#password");
      document.querySelector("form").addEventListener("submit", function (e) {
        e.preventDefault();
        if (
          username_input.value.trim() === "" ||
          password_input.value.trim() === ""
        ) {
          alert("Please enter both username and password.");
          return;
        } else if (
          username_input.value === "admin" &&
          password_input.value === "admin"
        ) {
          window.location.href = "control.html";
          clear_input();
        } else if (
          username_input.value === "cashier" &&
          password_input.value === "cashier"
        ) {
          window.location.href = "pos.html";
          clear_input();
        } else {
          alert("Invalid credentials. Please try again.");
        }
      });
      function clear_input() {
        username_input.value = "";
        password_input.value = "";
      }
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
